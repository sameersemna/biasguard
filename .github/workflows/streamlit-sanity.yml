name: Streamlit Build Sanity

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'requirements.txt'
      - 'runtime.txt'
      - '.github/workflows/streamlit-sanity.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'requirements.txt'
      - 'runtime.txt'
      - '.github/workflows/streamlit-sanity.yml'

jobs:
  streamlit-sanity:
    name: Streamlit dependency + import check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install root requirements (Streamlit Cloud behavior)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate frontend imports and syntax
        run: |
          python -m py_compile frontend/streamlit_app.py
          python - <<'PY'
          import streamlit
          import httpx
          import pandas
          import plotly
          print('Streamlit sanity check passed')
          PY
