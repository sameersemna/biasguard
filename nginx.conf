# 1. Global Redirect: Force all HTTP to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Redirects all subdomains (prufai.de, test.prufai.de, etc.) to HTTPS
    return 301 https://$host$request_uri;
}

# --- SECURE SERVER BLOCKS (HTTPS) ---

# Test Main
server {
    listen 443 ssl;
    server_name test.prufai.de;

    ssl_certificate /etc/letsencrypt/live/prufai.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prufai.de/privkey.pem;

    root /var/www/html/test;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /graphql {
        proxy_pass http://localhost:4000/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Test Admin
