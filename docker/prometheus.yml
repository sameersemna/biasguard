global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: codelab-monitor

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: biasguard-api
    metrics_path: /metrics
    static_configs:
      - targets: ["promaxgb10-6116:8000"]
